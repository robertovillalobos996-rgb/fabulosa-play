
backend:
  name: git-gateway
  branch: main

media_folder: "static/uploads"
public_folder: "/uploads"

locale: "es"

collections:
  - name: "pages"
    label: "Páginas"
    files:
      - file: "content/home.md"
        label: "Inicio"
        name: "home"
        fields:
          - { label: "Título", name: "title", widget: "string" }
          - { label: "Imagen de portada (hero)", name: "hero_image", widget: "image" }
          - { label: "Introducción", name: "intro", widget: "text" }

  - name: "noticias"
    label: "Noticias"
    folder: "content/noticias"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Título", name: "title", widget: "string" }
      - { label: "Fecha", name: "date", widget: "datetime" }
      - { label: "Imagen principal", name: "image", widget: "image" }
      - { label: "Cuerpo", name: "body", widget: "markdown" }

  - name: "publicidad"
    label: "Publicidad"
    folder: "content/publicidad"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Título", name: "title", widget: "string" }
      - { label: "Imagen (banner)", name: "image", widget: "image" }
      - { label: "Enlace", name: "url", widget: "string" }
      - { label: "Descripción corta", name: "description", widget: "text" }
